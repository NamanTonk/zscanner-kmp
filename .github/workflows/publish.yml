name: Publish Library to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Publish and sign KMP targets to local directory
        run: ./gradlew :zscanner:publish
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Zip deployment bundle
        run: |
          cd zscanner/build/repo
          zip -r ../bundle.zip *

      - name: Upload bundle to Sonatype Central Portal
        env:
          USERNAME: ${{ secrets.OSSRH_USERNAME }}
          PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "Error: OSSRH_USERNAME or OSSRH_PASSWORD secret is empty!"
            exit 1
          fi
          AUTH=$(echo -n "$USERNAME:$PASSWORD" | base64 | tr -d '\n')
          curl -s --fail-with-body -X POST \
            -H "Authorization: Bearer $AUTH" \
            -F "bundle=@zscanner/build/bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"
